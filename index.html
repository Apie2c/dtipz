<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apie2c Predictions | Daily Sports Tips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white font-sans">

    <header class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-yellow-500">APIE2C TIPS</h1>
        <div id="auth-buttons">
            <button onclick="login()" class="bg-yellow-500 text-black px-4 py-2 rounded font-bold">Login / Sign Up</button>
        </div>
    </header>

    <section class="py-10 px-6 text-center">
        <h2 class="text-3xl font-bold mb-8">Go Premium for Max Odds</h2>
        <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h3 class="text-xl font-bold">Weekly</h3>
                <p class="text-3xl font-bold my-4">50 GHS</p>
                <button onclick="pay('weekly')" class="w-full bg-yellow-500 text-black py-2 rounded font-bold">Join Now</button>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border-2 border-yellow-500 scale-105">
                <h3 class="text-xl font-bold">Monthly</h3>
                <p class="text-3xl font-bold my-4">150 GHS</p>
                <button onclick="pay('monthly')" class="w-full bg-yellow-500 text-black py-2 rounded font-bold">Most Popular</button>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <h3 class="text-xl font-bold">Yearly</h3>
                <p class="text-3xl font-bold my-4">1,200 GHS</p>
                <button onclick="pay('yearly')" class="w-full bg-yellow-500 text-black py-2 rounded font-bold">Save Big</button>
            </div>
        </div>
    </section>

    <main class="max-w-4xl mx-auto p-6">
        <h2 class="text-2xl font-bold mb-4">Today's Predictions</h2>
        
        <div class="bg-gray-800 p-4 rounded-lg mb-4 flex justify-between items-center">
            <div>
                <p class="text-sm text-gray-400">EPL - 15:00</p>
                <p class="font-bold">Arsenal vs Man City</p>
            </div>
            <div class="text-right">
                <p class="text-yellow-500 font-bold">Over 2.5 Goals</p>
                <span class="text-xs bg-green-600 px-2 py-1 rounded">FREE</span>
            </div>
        </div>

        <div class="relative bg-gray-800 p-4 rounded-lg overflow-hidden">
            <div class="blur-md select-none">
                <p class="text-sm">Bundesliga - 17:30</p>
                <p class="font-bold">Real Madrid vs Barcelona</p>
                <p class="text-yellow-500 font-bold">Home Win & Over 1.5</p>
            </div>
            <div class="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-60">
                <i class="fas fa-lock text-2xl mb-2"></i>
                <p class="font-bold text-sm">VIP ONLY</p>
                <button onclick="pay('monthly')" class="mt-2 text-xs text-yellow-500 underline">Unlock now</button>
            </div>
        </div>
    </main>

    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="app.js"></script>
</body>
</html>
