<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ElitePicks GH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" class="logo">ELITE<span>PICKS</span> <span class="logo-gh">GH</span></a>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-sub">Login to access your VIP picks</p>

            <div class="form-group" style="margin-bottom:16px">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" placeholder="e.g. 0551234567">
            </div>
            <div class="form-group" style="margin-bottom:24px">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="Enter your password">
            </div>
            <button class="btn btn-primary btn-block" style="margin-bottom:12px">Login</button>
            <button class="btn btn-outline btn-block" onclick="alert('Please contact us on WhatsApp to reset your password.')">
                <i class="fab fa-whatsapp"></i> Reset via WhatsApp
            </button>

            <div class="auth-footer" style="margin-top:28px">
                <p>Don't have an account? <a href="index.html#pricing">Subscribe Now</a></p>
            </div>

            <div style="border-top: 1px solid var(--border); margin-top: 28px; padding-top: 20px; text-align:center;">
                <p style="font-size:12px; color:var(--text-muted);">
                    💡 <strong>Note:</strong> After payment confirmation, you'll receive WhatsApp group access directly. This login portal is for future use.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
